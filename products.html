<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop — Products</title>
    <link href="/dist/output.css" rel="stylesheet" />
    <!-- твой скомпилированный Tailwind -->
  </head>
  <body class="bg-gray-50 text-gray-800 antialiased">
    <!-- Header / Навигация -->
    <header class="sticky top-0 z-50 bg-white shadow-sm">
      <div class="container mx-auto px-4 lg:px-8 py-4 flex items-center justify-between">
        <a href="/" class="text-3xl font-bold text-orange-600">Brand</a>

        <nav class="hidden md:flex gap-8 font-medium">
          <a href="/" class="hover:text-orange-600 transition">Home</a>
          <a href="/about" class="hover:text-orange-600 transition">About</a>
          <a href="/products" class="hover:text-orange-600 transition">Products</a>
          <a href="/contacts" class="hover:text-orange-600 transition">Contacts</a>
        </nav>

        <div class="flex items-center gap-6">
          <button class="text-2xl hover:text-orange-600">🛒</button>
          <button class="md:hidden">☰</button>
        </div>
      </div>
    </header>
    <main class="pt-8 pb-20">
      <div class="container mx-auto px-4 lg:px-8">
        <h1 class="text-4xl font-bold mb-10">Product Catalog</h1>

        <div class="flex flex-col lg:flex-row gap-10">
          <!-- Сайдбар -->
          <aside class="lg:w-64 flex-shrink-0">
            <div class="bg-white rounded-xl shadow p-6 sticky top-24">
              <h3 class="text-xl font-bold mb-6">Categories</h3>
              <ul class="space-y-3">
                <li>
                  <a
                    href="#"
                    class="block py-2 px-4 bg-orange-50 text-orange-700 rounded-lg font-medium">
                    Smartphones
                  </a>
                </li>
                <li>
                  <a href="#" class="block py-2 px-4 hover:bg-orange-50 rounded-lg transition">
                    Laptops
                  </a>
                </li>
                <li>
                  <a href="#" class="block py-2 px-4 hover:bg-orange-50 rounded-lg transition">
                    Headphones
                  </a>
                </li>
                <li>
                  <a href="#" class="block py-2 px-4 hover:bg-orange-50 rounded-lg transition">
                    TVs
                  </a>
                </li>
                <!-- ... -->
              </ul>

              <hr class="my-8" />

              <h4 class="font-bold mb-4">Price</h4>
              <div class="space-y-3">
                <label class="flex items-center">
                  <input type="checkbox" />
                  <span class="ml-3">Up to $100</span>
                </label>
                <!-- ... -->
              </div>
            </div>
          </aside>

          <!-- Основной контент -->
          <div class="flex-1">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 mb-16">
              <!-- 12–16 карточек товаров (аналогично главной) -->
              <div class="bg-white rounded-2xl shadow hover:shadow-xl transition">...</div>
            </div>

            <!-- Пагинация -->
            <div class="flex justify-center items-center gap-3 flex-wrap">
              <button class="px-5 py-3 rounded-lg bg-orange-600 text-white hover:bg-orange-700">
                1
              </button>
              <button class="px-5 py-3 rounded-lg hover:bg-orange-50">2</button>
              <button class="px-5 py-3 rounded-lg hover:bg-orange-50">3</button>
              <span class="px-4">...</span>
              <button class="px-5 py-3 rounded-lg hover:bg-orange-50">18</button>
              <button class="px-6 py-3 rounded-lg bg-orange-600 text-white hover:bg-orange-700">
                →
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-300 py-12">
      <div class="container mx-auto px-6 grid md:grid-cols-4 gap-10">
        <div>
          <h4 class="text-white text-xl font-bold mb-4">Brand</h4>
          <p>Online electronics store</p>
        </div>
        <!-- ещё 3 колонки -->
      </div>
      <div class="text-center mt-10 text-sm opacity-70">© 2026 Brand. All rights reserved.</div>
    </footer>

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  </body>
</html>
